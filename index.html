<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Anita Gourmet - Ventas</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Anita Gourmet">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="icon-192.png" type="image/png">

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl p-6">
    <h1 class="text-2xl font-bold text-center mb-4">📒 Anita Gourmet - Ventas</h1>

    <!-- BOTONES ARRIBA -->
    <div class="flex gap-4 mb-4">
      <button id="btnImprimir" type="button" class="bg-green-600 text-white rounded p-2 hover:bg-green-700">🖨 Imprimir</button>
      <button id="btnLimpiar" type="button" class="bg-red-600 text-white rounded p-2 hover:bg-red-700">🗑 Limpiar</button>
    </div>

    <!-- FORMULARIO -->
    <form id="ventaForm" class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
      <input id="cliente" type="text" placeholder="Cliente" class="border rounded p-2" required>
      <input id="producto" type="text" placeholder="Producto" class="border rounded p-2" required>
      <input id="cantidad" type="number" placeholder="Cantidad" min="1" class="border rounded p-2" required>
      <input id="precio" type="number" placeholder="Precio" min="0" step="0.01" class="border rounded p-2" required>
      <button type="submit" class="bg-blue-600 text-white rounded p-2 hover:bg-blue-700">➕ Añadir</button>
    </form>

    <!-- TABLA -->
    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-200">
            <th class="p-2 border">#</th>
            <th class="p-2 border">Cliente</th>
            <th class="p-2 border">Producto</th>
            <th class="p-2 border">Cantidad</th>
            <th class="p-2 border">Precio</th>
            <th class="p-2 border">Total</th>
            <th class="p-2 border">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaVentas"></tbody>
      </table>
    </div>
  </div>

<script>
  let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
  let editIndex = null;

  const form = document.getElementById("ventaForm");
  const tabla = document.getElementById("tablaVentas");
  const cliente = document.getElementById("cliente");
  const producto = document.getElementById("producto");
  const cantidad = document.getElementById("cantidad");
  const precio = document.getElementById("precio");

  function guardarDatos() {
    localStorage.setItem("ventas", JSON.stringify(ventas));
  }

  function renderTabla() {
    tabla.innerHTML = "";
    ventas.forEach((v, index) => {
      tabla.innerHTML += `
        <tr>
          <td class="p-2 border">${index+1}</td>
          <td class="p-2 border">${v.cliente}</td>
          <td class="p-2 border">${v.producto}</td>
          <td class="p-2 border">${v.cantidad}</td>
          <td class="p-2 border">$${parseFloat(v.precio).toFixed(2)}</td>
          <td class="p-2 border">$${(v.cantidad*v.precio).toFixed(2)}</td>
          <td class="p-2 border flex gap-2">
            <button type="button" onclick="editar(${index})" class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600">✏</button>
            <button type="button" onclick="eliminar(${index})" class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">🗑</button>
          </td>
        </tr>`;
    });
  }

  form.addEventListener("submit", e => {
    e.preventDefault();
    const nueva = {
      cliente: cliente.value,
      producto: producto.value,
      cantidad: parseInt(cantidad.value),
      precio: parseFloat(precio.value)
    };
    if (editIndex !== null) {
      ventas[editIndex] = nueva;
      editIndex = null;
    } else {
      ventas.push(nueva);
    }
    guardarDatos();
    renderTabla();
    form.reset();
  });

  function editar(index) {
    const v = ventas[index];
    cliente.value = v.cliente;
    producto.value = v.producto;
    cantidad.value = v.cantidad;
    precio.value = v.precio;
    editIndex = index;
    cliente.focus();
  }

  function eliminar(index) {
    if(confirm("¿Eliminar esta venta?")) {
      ventas.splice(index,1);
      guardarDatos();
      renderTabla();
    }
  }

  document.getElementById("btnImprimir").addEventListener("click", ()=>{
    const html = `
    <html><head><meta charset="utf-8"><title>Reporte</title></head><body>
    <h2>Reporte de Ventas</h2>
    <table border="1" cellspacing="0" cellpadding="4">
    <tr><th>#</th><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>Precio</th><th>Total</th></tr>
    ${ventas.map((v,i)=>`
      <tr><td>${i+1}</td><td>${v.cliente}</td><td>${v.producto}</td><td>${v.cantidad}</td><td>$${v.precio.toFixed(2)}</td><td>$${(v.cantidad*v.precio).toFixed(2)}</td></tr>`).join("")}
    </table></body></html>`;
    const win = window.open("","_blank");
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(()=>win.print(),300);
  });

  document.getElementById("btnLimpiar").addEventListener("click", ()=>{
    if(confirm("¿Limpiar todas las ventas?")) {
      ventas=[];
      guardarDatos();
      renderTabla();
    }
  });

  renderTabla();
</script>

</body>
</html>
